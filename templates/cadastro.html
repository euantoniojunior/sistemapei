<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Aluno - PEI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f4f7fa;  
      margin: 0;
      padding: 0;
    }
    .form-container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      padding: 30px;
    }
    h2 {
      color: #003D7C;
      text-align: center;
      margin-bottom: 30px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      color: #003D7C;
    }
    input[type="text"],
    input[type="date"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-top: 5px;
    }
    input[readonly], textarea[readonly] {
      background-color: #f9f9f9 !important;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }
    .button-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    button.btn-salvar,
    button.btn-editar,
    button.btn-finalizar,
    button.btn-pdf {
      background-color: #F7931E;
      color: white;
      border: none;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      width: auto;
      min-width: 120px;
    }
    button.btn-salvar:hover,
    button.btn-editar:hover,
    button.btn-finalizar:hover,
    button.btn-pdf:hover {
      background-color: #e67e22;
    }
    button.btn-finalizar {
      background-color: #003D7C;
    }
    button.btn-finalizar:hover {
      background-color: #002a52;
    }
    button.btn-editar {
      background-color: #2c3e50;
    }
    button.btn-editar:hover {
      background-color: #1a252f;
    }
    button.btn-pdf {
      background-color: #2ecc71;
    }
    button.btn-pdf:hover {
      background-color: #27ae60;
    }
    #msg {
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
    }
    @media (max-width: 768px) {
      .button-group {
        flex-direction: column;
        align-items: stretch;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="form-container">
  <h2>Plano Educacional Individualizado (PEI)</h2>

  <!-- Formulário -->
  <form id="peiForm">
    <!-- Dados do Aluno -->
    <label for="nome">Nome do Aluno:</label>
    <input type="text" name="nome" id="nome" required>
    <div class="grid-2">
      <input type="text" name="curso" placeholder="Curso Técnico" required>
      <input type="text" name="unidade" placeholder="Unidade SENAC" required>
      <input type="text" name="periodo" placeholder="Período Letivo" required>
      <label for="data_elaboracao">Data de Elaboração:</label>
      <input type="date" name="data_elaboracao" id="data_elaboracao" required>
    </div>
    <label for="responsavel">Responsável pela Elaboração:</label>
    <input type="text" name="responsavel" id="responsavel" required>
    <hr style="margin: 30px 0; border: none; border-top: 1px solid #ddd;">
    
    <!-- Identificação do Aluno -->
    <label>Data de Nascimento:</label>
    <div class="grid-3">
      <input type="date" name="data_nascimento" id="data_nascimento">
      <input type="number" name="idade" placeholder="Idade (anos)">
      <input type="text" name="diagnostico_cid" placeholder="Diagnóstico (CID)">
      <input type="text" name="transtorno_identificado" placeholder="Transtorno identificado">
      
      <div style="display:flex; flex-direction: column; gap: 5px;">
        <label for="laudo_medico">Laudo Médico:</label>
        <select name="laudo_medico" id="laudo_medico">
          <option value="">Selecione</option>
          <option value="Sim">Sim</option>
          <option value="Não">Não</option>
        </select>
      </div>
      <div style="display:flex; flex-direction: column; gap: 5px;">
        <label for="laudo_medico_arquivo">Upload Laudo:</label>
        <input type="file" name="laudo_medico_arquivo" id="laudo_medico_arquivo" accept=".pdf,.jpg,.jpeg,.png,.docx,.txt">
      </div>
    </div>
    
    <label>Profissionais que acompanham o aluno (nome e dias):</label>
    <input type="text" name="psicologo" placeholder="Psicólogo (nome e dias)">
    <input type="text" name="psiquiatra" placeholder="Psiquiatra (nome e dias)">
    <input type="text" name="psicopedagogo" placeholder="Psicopedagogo (nome e dias)">
    <input type="text" name="outros_profissionais" placeholder="Outros profissionais">

    <!-- Perfil do Aluno -->
    <label>Perfil do Aluno</label>
    <textarea name="perfil_aluno" rows="5" placeholder="Descreva aqui..."></textarea>

    <!-- Objetivos Gerais -->
    <label>Objetivos Gerais do PEI</label>
    <textarea name="objetivos_gerais" rows="5" placeholder="Descreva aqui..."></textarea>

    <!-- Adaptações Pedagógicas -->
    <label>Adaptações e Estratégias Pedagógicas</label>
    <textarea name="adaptaçoes_pedagogicas" rows="8" placeholder="Descreva as adaptações pedagógicas utilizadas..."></textarea>

    <!-- Intervenções Complementares -->
    <label>Intervenções Complementares</label>
    <textarea name="intervencoes_complementares" rows="5" placeholder="Descreva as intervenções complementares..."></textarea>

    <!-- Metas Individuais -->
    <label>Metas Individuais (Curto, Médio e Longo Prazo)</label>
    <table>
      <thead>
        <tr>
          <th>Período</th><th>Meta</th><th>Responsável</th><th>Avaliação</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Curto prazo</td>
          <td><input type="text" name="meta_curto_prazo" placeholder="Meta"></td>
          <td><input type="text" name="responsavel_curto" placeholder="Responsável"></td>
          <td><input type="text" name="avaliacao_curto" placeholder="Avaliação"></td>
        </tr>
        <tr>
          <td>Médio prazo</td>
          <td><input type="text" name="meta_medio_prazo" placeholder="Meta"></td>
          <td><input type="text" name="responsavel_medio" placeholder="Responsável"></td>
          <td><input type="text" name="avaliacao_medio" placeholder="Avaliação"></td>
        </tr>
        <tr>
          <td>Longo prazo</td>
          <td><input type="text" name="meta_longo_prazo" placeholder="Meta"></td>
          <td><input type="text" name="responsavel_longo" placeholder="Responsável"></td>
          <td><input type="text" name="avaliacao_longo" placeholder="Avaliação"></td>
        </tr>
      </tbody>
    </table>

    <!-- Acompanhamento -->
    <label>Observações gerais:</label>
    <textarea name="observacoes_gerais" rows="4" placeholder="Observações gerais..."></textarea>
    <div class="grid-2">
      <input type="date" name="proxima_avaliacao" placeholder="Data da próxima avaliação">
      <input type="text" name="responsavel_legal" placeholder="Responsável legal">
      <input type="text" name="orientador_responsavel" placeholder="Orientador responsável">
      <input type="text" name="supervisor" placeholder="Supervisor">
      <input type="text" name="gerente_unidade" placeholder="Gerente de unidade">
    </div>

    <!-- Botões iniciais -->
    <div class="button-group" id="botoes-iniciais">
      <button type="submit" class="btn-salvar">Salvar PEI</button>
      <button type="button" onclick="limparCampos()" class="btn-editar">Limpar Dados</button>
      <button type="button" onclick="location.href='/dashboard'" class="btn-finalizar">Voltar</button>
    </div>

    <!-- Botões pós-salvamento -->
    <div class="button-group" id="botoes-pos-salvar" style="display: none;">
      <button type="button" onclick="editarCampos()" class="btn-editar">Editar Cadastro</button>
      <button type="button" onclick="finalizarCadastro()" class="btn-finalizar">Finalizar Cadastro</button>
      <button type="button" id="exportarPDF" disabled onclick="exportarPDF()" class="btn-pdf">Exportar como PDF</button>
    </div>

    <!-- Feedback -->
    <p id="msg"></p>
  </form>
</div>

<script>
  // Variáveis globais
  const form = document.getElementById('peiForm');
  const msgEl = document.getElementById('msg');
  let cadastroFinalizado = false;

  // ========== EXPORTAR PDF - SEMPRE GLOBAL E FUNCIONAL ========== ✅
  async function exportarPDF() {
    if (!cadastroFinalizado) {
      alert("⚠️ Finalize o cadastro antes de exportar.");
      return;
    }

    const aluno = {
      nome: form.nome.value,
      curso: form.curso.value,
      unidade: form.unidade.value,
      periodo: form.periodo.value,
      data_elaboracao: form.data_elaboracao.value,
      responsavel: form.responsavel.value,
      data_nascimento: form.data_nascimento.value,
      idade: form.idade.value,
      diagnostico_cid: form.diagnostico_cid.value,
      transtorno_identificado: form.transtorno_identificado.value,
      laudo_medico: form.laudo_medico.value,
      psicologo: form.psicologo.value,
      psiquiatra: form.psiquiatra.value,
      psicopedagogo: form.psicopedagogo.value,
      outros_profissionais: form.outros_profissionais.value,
      perfil_aluno: form.perfil_aluno.value,
      observacoes_gerais: form.observacoes_gerais.value,
      proxima_avaliacao: form.proxima_avaliacao.value,
      responsavel_legal: form.responsavel_legal.value,
      orientador_responsavel: form.orientador_responsavel.value,
      supervisor: form.supervisor.value,
      gerente_unidade: form.gerente_unidade.value,
      meta_curto_prazo: form.meta_curto_prazo.value,
      responsavel_curto: form.responsavel_curto.value,
      avaliacao_curto: form.avaliacao_curto.value,
      meta_medio_prazo: form.meta_medio_prazo.value,
      responsavel_medio: form.responsavel_medio.value,
      avaliacao_medio: form.avaliacao_medio.value,
      meta_longo_prazo: form.meta_longo_prazo.value,
      responsavel_longo: form.responsavel_longo.value,
      avaliacao_longo: form.avaliacao_longo.value,
      adaptaçoes_pedagogicas: form.adaptaçoes_pedagogicas.value,
      intervencoes_complementares: form.intervencoes_complementares.value,
      objetivos_gerais: form.objetivos_gerais.value
    };

    try {
      const res = await fetch('/api/pei/pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(aluno)
      });

      if (!res.ok) throw new Error("Erro no servidor");

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `PEI_${aluno.nome || 'aluno'}_${new Date().toISOString().split('T')[0]}.pdf`;
      link.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      console.error("Erro ao exportar PDF:", err);
      alert("❌ Falha ao exportar PDF.");
    }
  }

  // Função chamada ao submeter o formulário
  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const aluno = {
      nome: form.nome.value.trim(),
      curso: form.curso.value.trim(),
      unidade: form.unidade.value.trim(),
      periodo: form.periodo.value.trim(),
      data_elaboracao: form.data_elaboracao.value,
      responsavel: form.responsavel.value.trim(),
      data_nascimento: form.data_nascimento.value,
      idade: form.idade.value,
      diagnostico_cid: form.diagnostico_cid.value,
      transtorno_identificado: form.transtorno_identificado.value,
      laudo_medico: form.laudo_medico.value,
      psicologo: form.psicologo.value,
      psiquiatra: form.psiquiatra.value,
      psicopedagogo: form.psicopedagogo.value,
      outros_profissionais: form.outros_profissionais.value,
      perfil_aluno: form.perfil_aluno.value,
      observacoes_gerais: form.observacoes_gerais.value,
      proxima_avaliacao: form.proxima_avaliacao.value,
      responsavel_legal: form.responsavel_legal.value,
      orientador_responsavel: form.orientador_responsavel.value,
      supervisor: form.supervisor.value,
      gerente_unidade: form.gerente_unidade.value
    };

    const conteudo = {
      objetivos_gerais: form.objetivos_gerais.value,
      adaptaçoes_pedagogicas: form.adaptaçoes_pedagogicas.value,
      intervencoes_complementares: form.intervencoes_complementares.value,
      metas: {
        curto_prazo: {
          meta: form.meta_curto_prazo.value,
          responsavel: form.responsavel_curto.value,
          avaliacao: form.avaliacao_curto.value
        },
        medio_prazo: {
          meta: form.meta_medio_prazo.value,
          responsavel: form.responsavel_medio.value,
          avaliacao: form.avaliacao_medio.value
        },
        longo_prazo: {
          meta: form.meta_longo_prazo.value,
          responsavel: form.responsavel_longo.value,
          avaliacao: form.avaliacao_longo.value
        }
      }
    };

    const formData = new FormData();
    formData.append("aluno", JSON.stringify(aluno));
    formData.append("conteudo", JSON.stringify(conteudo));

    if (form.laudo_medico_arquivo.files.length > 0) {
      formData.append("laudo_medico_arquivo", form.laudo_medico_arquivo.files[0]);
    }

    try {
      const res = await fetch('/api/pei', {
        method: 'POST',
        body: formData
      });

      const data = await res.json();

      if (res.ok) {
        msgEl.style.color = 'green';
        msgEl.innerText = '✅ PEI salvo com sucesso!';
        bloquearCampos(true);
        ocultarBotoesIniciais();
        mostrarBotoesPosSalvar();
        cadastroFinalizado = true;
      } else {
        msgEl.style.color = 'red';
        msgEl.innerText = '❌ Erro ao salvar o PEI: ' + (data.error || 'Verifique os dados.');
      }
    } catch (err) {
      console.error("Erro ao salvar:", err);
      msgEl.style.color = 'red';
      msgEl.innerText = '❌ Falha na comunicação com o servidor.';
    }
  });

  // ========== FUNÇÕES AUXILIARES ==========
  function bloquearCampos(bloquear = true) {
    Array.from(form.elements).forEach(el => {
      if (el.type !== 'button') el.readOnly = bloquear;
    });
  }

  function limparCampos() {
    form.reset();
    msgEl.innerText = '';
    ocultarBotoesPosSalvar();
    mostrarBotoesIniciais();
    document.getElementById("exportarPDF").disabled = true;
    cadastroFinalizado = false;
  }

  function editarCampos() {
    bloquearCampos(false);
    ocultarBotoesPosSalvar();
    mostrarBotoesIniciais();
    msgEl.style.color = 'green';
    msgEl.innerText = 'Você está editando o cadastro.';
  }

  function finalizarCadastro() {
    cadastroFinalizado = true;
    document.getElementById("exportarPDF").disabled = false;
    alert("✅ Cadastro finalizado. Agora você pode exportar como PDF.");
  }

  function ocultarBotoesIniciais() {
    document.getElementById('botoes-iniciais').style.display = 'none';
  }

  function mostrarBotoesIniciais() {
    document.getElementById('botoes-iniciais').style.display = 'flex';
  }

  function mostrarBotoesPosSalvar() {
    document.getElementById('botoes-pos-salvar').style.display = 'flex';
  }

  function ocultarBotoesPosSalvar() {
    document.getElementById('botoes-pos-salvar').style.display = 'none';
  }
</script>
</body>
</html>
