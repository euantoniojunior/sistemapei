<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno - PEI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7fa; 
            margin: 0;
            padding: 0;
        }

        .form-container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h2 {
            color: #003D7C;
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            margin-top: 10px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .grid-2,
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button.btn-salvar,
        button.btn-editar,
        button.btn-finalizar {
            background-color: #F7931E;
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: auto;
            min-width: 120px;
        }

        button.btn-salvar:hover,
        button.btn-editar:hover,
        button.btn-finalizar:hover {
            background-color: #e67e22;
        }

        button.btn-editar {
            background-color: #2c3e50;
        }

        button.btn-editar:hover {
            background-color: #1a252f;
        }

        button.btn-finalizar {
            background-color: #003D7C;
        }

        button.btn-finalizar:hover {
            background-color: #002a54;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Cadastro de Plano Educacional Individualizado (PEI)</h2>

    <!-- Formulário -->
    <form id="peiForm">
        <!-- Dados Pessoais -->
        <label for="nome">Nome do Aluno:</label>
        <input type="text" name="nome" id="nome" required>

        <div class="grid-2">
            <div>
                <label for="curso">Curso:</label>
                <input type="text" name="curso" id="curso" required>
            </div>
            <div>
                <label for="unidade">Unidade:</label>
                <input type="text" name="unidade" id="unidade" required>
            </div>
        </div>

        <div class="grid-2">
            <div>
                <label for="periodo">Período:</label>
                <input type="text" name="periodo" id="periodo" required>
            </div>
            <div>
                <label for="data_elaboracao">Data de Elaboração:</label>
                <input type="date" name="data_elaboracao" id="data_elaboracao">
            </div>
        </div>

        <div class="grid-2">
            <div>
                <label for="responsavel">Responsável:</label>
                <input type="text" name="responsavel" id="responsavel" required>
            </div>
            <div>
                <label for="data_nascimento">Data de Nascimento:</label>
                <input type="date" name="data_nascimento" id="data_nascimento">
            </div>
        </div>

        <div class="grid-2">
            <div>
                <label for="idade">Idade:</label>
                <input type="number" name="idade" id="idade">
            </div>
            <div>
                <label for="diagnostico_cid">Diagnóstico CID:</label>
                <input type="text" name="diagnostico_cid" id="diagnostico_cid">
            </div>
        </div>

        <div class="grid-2">
            <div>
                <label for="transtorno_identificado">Transtorno Identificado:</label>
                <input type="text" name="transtorno_identificado" id="transtorno_identificado">
            </div>
            <div>
                <label for="laudo_medico">Laudo Médico:</label>
                <select name="laudo_medico" id="laudo_medico">
                    <option value="">Selecione</option>
                    <option value="Sim">Sim</option>
                    <option value="Não">Não</option>
                </select>
            </div>
        </div>

        <div>
            <label for="laudo_medico_arquivo">Upload Laudo:</label>
            <input type="file" name="laudo_medico_arquivo" id="laudo_medico_arquivo"
                   accept=".pdf,.jpg,.jpeg,.png,.docx,.txt">
        </div>

        <!-- Profissionais -->
        <label>Profissionais que acompanham o aluno (nome e dias):</label>
        <div class="grid-2">
            <div>
                <input type="text" name="psicologo" id="psicologo" placeholder="Psicólogo (nome e dias)">
            </div>
            <div>
                <input type="text" name="psiquiatra" id="psiquiatra" placeholder="Psiquiatra (nome e dias)">
            </div>
            <div>
                <input type="text" name="psicopedagogo" id="psicopedagogo"
                       placeholder="Psicopedagogo (nome e dias)">
            </div>
            <div>
                <input type="text" name="outros_profissionais" id="outros_profissionais"
                       placeholder="Outros profissionais">
            </div>
        </div>

        <label for="perfil_aluno">Perfil do Aluno:</label>
        <textarea name="perfil_aluno" id="perfil_aluno"></textarea>

        <!-- Objetivos Gerais -->
        <label for="objetivos_gerais">Objetivos Gerais:</label>
        <textarea name="objetivos_gerais" id="objetivos_gerais"></textarea>

        <!-- Adaptações Pedagógicas -->
        <label for="adaptaçoes_pedagogicas">Adaptações Pedagógicas:</label>
        <textarea name="adaptaçoes_pedagogicas" id="adaptaçoes_pedagogicas"></textarea>

        <!-- Intervenções Complementares -->
        <label for="intervencoes_complementares">Intervenções Complementares:</label>
        <textarea name="intervencoes_complementares" id="intervencoes_complementares"></textarea>

        <!-- Metas -->
        <h3>Metas Individuais</h3>
        <div class="grid-3">
            <div>
                <label for="meta_curto_prazo">Meta (Curto prazo):</label>
                <input type="text" name="meta_curto_prazo" id="meta_curto_prazo">
            </div>
            <div>
                <label for="responsavel_curto">Responsável:</label>
                <input type="text" name="responsavel_curto" id="responsavel_curto">
            </div>
            <div>
                <label for="avaliacao_curto">Avaliação:</label>
                <input type="text" name="avaliacao_curto" id="avaliacao_curto">
            </div>
        </div>

        <div class="grid-3">
            <div>
                <label for="meta_medio_prazo">Meta (Médio prazo):</label>
                <input type="text" name="meta_medio_prazo" id="meta_medio_prazo">
            </div>
            <div>
                <label for="responsavel_medio">Responsável:</label>
                <input type="text" name="responsavel_medio" id="responsavel_medio">
            </div>
            <div>
                <label for="avaliacao_medio">Avaliação:</label>
                <input type="text" name="avaliacao_medio" id="avaliacao_medio">
            </div>
        </div>

        <div class="grid-3">
            <div>
                <label for="meta_longo_prazo">Meta (Longo prazo):</label>
                <input type="text" name="meta_longo_prazo" id="meta_longo_prazo">
            </div>
            <div>
                <label for="responsavel_longo">Responsável:</label>
                <input type="text" name="responsavel_longo" id="responsavel_longo">
            </div>
            <div>
                <label for="avaliacao_longo">Avaliação:</label>
                <input type="text" name="avaliacao_longo" id="avaliacao_longo">
            </div>
        </div>

        <!-- Observações -->
        <label for="observacoes_gerais">Observações Gerais:</label>
        <textarea name="observacoes_gerais" id="observacoes_gerais"></textarea>

        <div class="grid-2">
            <div>
                <label for="proxima_avaliacao">Próxima Avaliação:</label>
                <input type="date" name="proxima_avaliacao" id="proxima_avaliacao">
            </div>
        </div>

        <!-- Responsáveis -->
        <div class="grid-2">
            <div>
                <label for="responsavel_legal">Responsável Legal:</label>
                <input type="text" name="responsavel_legal" id="responsavel_legal">
            </div>
            <div>
                <label for="orientador_responsavel">Orientador Responsável:</label>
                <input type="text" name="orientador_responsavel" id="orientador_responsavel">
            </div>
        </div>

        <div class="grid-2">
            <div>
                <label for="supervisor">Supervisor:</label>
                <input type="text" name="supervisor" id="supervisor">
            </div>
            <div>
                <label for="gerente_unidade">Gerente da Unidade:</label>
                <input type="text" name="gerente_unidade" id="gerente_unidade">
            </div>
        </div>

        <!-- Botões -->
        <div class="button-group" id="botoes-iniciais">
            <button type="submit" class="btn-salvar">Salvar PEI</button>
            <button type="button" onclick="editarCampos()" class="btn-editar">Editar Dados</button>
            <button type="button" onclick="location.href='/dashboard'" class="btn-finalizar">Voltar</button>
        </div>

        <!-- Feedback -->
        <p id="msg"></p>
    </form>
</div>

<script>
    const form = document.getElementById('peiForm');
    const msgEl = document.getElementById('msg');
    let alunoData = {};
    let conteudoData = {};

    async function handleSubmit(event) {
        event.preventDefault();

        // Coleta dados do formulário
        alunoData = {
            student_id: document.getElementById("student_id").value || "",
            nome: document.getElementById("nome").value.trim(),
            curso: document.getElementById("curso").value.trim(),
            unidade: document.getElementById("unidade").value.trim(),
            periodo: document.getElementById("periodo").value.trim(),
            data_elaboracao: document.getElementById("data_elaboracao").value,
            responsavel: document.getElementById("responsavel").value.trim(),
            data_nascimento: document.getElementById("data_nascimento").value || "",
            idade: document.getElementById("idade").value || "",
            diagnostico_cid: document.getElementById("diagnostico_cid").value || "",
            transtorno_identificado: document.getElementById("transtorno_identificado").value || "",
            laudo_medico: document.getElementById("laudo_medico").value || "",
            psicologo: document.getElementById("psicologo").value || "",
            psiquiatra: document.getElementById("psiquiatra").value || "",
            psicopedagogo: document.getElementById("psicopedagogo").value || "",
            outros_profissionais: document.getElementById("outros_profissionais").value || "",
            perfil_aluno: document.getElementById("perfil_aluno").value || "",
            observacoes_gerais: document.getElementById("observacoes_gerais").value || "",
            proxima_avaliacao: document.getElementById("proxima_avaliacao").value || "",
            responsavel_legal: document.getElementById("responsavel_legal").value || "",
            orientador_responsavel: document.getElementById("orientador_responsavel").value || "",
            supervisor: document.getElementById("supervisor").value || "",
            gerente_unidade: document.getElementById("gerente_unidade").value || ""
        };

        conteudoData = {
            objetivos_gerais: document.getElementById("objetivos_gerais").value,
            adaptaçoes_pedagogicas: document.getElementById("adaptaçoes_pedagogicas").value,
            intervencoes_complementares: document.getElementById("intervencoes_complementares").value,
            metas: {
                curto_prazo: {
                    meta: document.getElementById("meta_curto_prazo").value,
                    responsavel: document.getElementById("responsavel_curto").value,
                    avaliacao: document.getElementById("avaliacao_curto").value
                },
                medio_prazo: {
                    meta: document.getElementById("meta_medio_prazo").value,
                    responsavel: document.getElementById("responsavel_medio").value,
                    avaliacao: document.getElementById("avaliacao_medio").value
                },
                longo_prazo: {
                    meta: document.getElementById("meta_longo_prazo").value,
                    responsavel: document.getElementById("responsavel_longo").value,
                    avaliacao: document.getElementById("avaliacao_longo").value
                }
            }
        };

        try {
            const res = await fetch("/api/pei", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ aluno: alunoData, conteudo: conteudoData })
            });

            const data = await res.json();
            if (res.ok) {
                msgEl.style.color = "green";
                msgEl.innerText = data.message || "✅ Cadastro salvo com sucesso!";
            } else {
                throw new Error(data.error || "Erro desconhecido");
            }
        } catch (err) {
            console.error("Erro ao salvar:", err);
            msgEl.style.color = "red";
            msgEl.innerText = "❌ Erro ao salvar dados: " + err.message;
        }
    }

    function validarCamposObrigatorios() {
        const fields = [
            { element: document.getElementById("nome"), label: "Nome" },
            { element: document.getElementById("curso"), label: "Curso" },
            { element: document.getElementById("unidade"), label: "Unidade" },
            { element: document.getElementById("periodo"), label: "Período" },
            { element: document.getElementById("responsavel"), label: "Responsável" }
        ];

        const missing = fields.filter(f => !f.element.value.trim());

        if (missing.length > 0) {
            msgEl.style.color = "red";
            msgEl.innerText = "⚠️ Campos obrigatórios ausentes.";
            return false;
        }

        return true;
    }

    function limparCampos() {
        form.reset();
        msgEl.innerText = "";
        alunoData = {};
        conteudoData = {};
    }

    function editarCampos(editando = true) {
        const editaveis = ['perfil_aluno', 'objetivos_gerais', 'adaptaçoes_pedagogicas', 'intervencoes_complementares',
            'meta_curto_prazo', 'responsavel_curto', 'avaliacao_curto',
            'meta_medio_prazo', 'responsavel_medio', 'avaliacao_medio',
            'meta_longo_prazo', 'responsavel_longo', 'avaliacao_longo',
            'observacoes_gerais', 'proxima_avaliacao'];

        const todosCampos = document.querySelectorAll(`input, textarea, select`);
        Array.from(todosCampos).forEach(campo => {
            campo.readOnly = !editando && !campo.id.includes("data_");
            campo.disabled = !editando && !editaveis.includes(campo.id);
        });
    }

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        if (!studentId) {
            limparCampos();
            return;
        }

        try {
            const res = await fetch(`/api/alunos/${studentId}`);
            const data = await res.json();

            if (!data.aluno) {
                alert("Dados inválidos retornados da API.");
                return;
            }

            const aluno = data.aluno;
            const conteudo = data.conteudo;

            // Preenche os campos do aluno
            document.getElementById("nome").value = aluno.nome || "";
            document.getElementById("curso").value = aluno.curso || "";
            document.getElementById("unidade").value = aluno.unidade || "";
            document.getElementById("periodo").value = aluno.periodo || "";
            document.getElementById("data_elaboracao").value = aluno.data_elaboracao ? aluno.data_elaboracao.split("T")[0] : "";
            document.getElementById("responsavel").value = aluno.responsavel || "";
            document.getElementById("data_nascimento").value = aluno.data_nascimento ? aluno.data_nascimento.split("T")[0] : "";
            document.getElementById("idade").value = aluno.idade || "";
            document.getElementById("diagnostico_cid").value = aluno.diagnostico_cid || "";
            document.getElementById("transtorno_identificado").value = aluno.transtorno_identificado || "";
            document.getElementById("laudo_medico").value = aluno.laudo_medico || "";
            document.getElementById("psicologo").value = aluno.psicologo || "";
            document.getElementById("psiquiatra").value = aluno.psiquiatra || "";
            document.getElementById("psicopedagogo").value = aluno.psicopedagogo || "";
            document.getElementById("outros_profissionais").value = aluno.outros_profissionais || "";
            document.getElementById("perfil_aluno").value = aluno.perfil_aluno || "";
            document.getElementById("observacoes_gerais").value = aluno.observacoes_gerais || "";
            document.getElementById("proxima_avaliacao").value = aluno.proxima_avaliacao ? aluno.proxima_avaliacao.split("T")[0] : "";
            document.getElementById("responsavel_legal").value = aluno.responsavel_legal || "";
            document.getElementById("orientador_responsavel").value = aluno.orientador_responsavel || "";
            document.getElementById("supervisor").value = aluno.supervisor || "";
            document.getElementById("gerente_unidade").value = aluno.gerente_unidade || "";

            // Se for edição, bloqueia alguns campos
            editarCampos(false);

        } catch (err) {
            console.error("Erro ao carregar aluno:", err);
            msgEl.style.color = "red";
            msgEl.innerText = "❌ Erro ao carregar dados do aluno.";
        }
    }

    if (form) {
        form.addEventListener('submit', handleSubmit);
    }
</script>

</body>
</html>
