<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Aluno - PEI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f4f7fa;  
      margin: 0;
      padding: 0;
    }
    .form-container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      padding: 30px;
    }
    h2 {
      color: #003D7C;
      text-align: center;
      margin-bottom: 30px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      color: #003D7C;
    }
    input[type="text"],
    input[type="date"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-top: 5px;
    }
    input[readonly], textarea[readonly] {
      background-color: #f9f9f9 !important;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }
    .button-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    button.btn-salvar,
    button.btn-editar,
    button.btn-finalizar {
      background-color: #F7931E;
      color: white;
      border: none;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      width: auto;
      min-width: 120px;
    }
    button.btn-salvar:hover,
    button.btn-editar:hover,
    button.btn-finalizar:hover {
      background-color: #e67e22;
    }
    button.btn-finalizar {
      background-color: #003D7C;
    }
    button.btn-editar {
      background-color: #2c3e50;
    }
    #msg {
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
    }
    @media (max-width: 768px) {
      .button-group {
        flex-direction: column;
        align-items: stretch;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="form-container">
  <h2>Plano Educacional Individualizado (PEI)</h2>

  <!-- Formulário -->
  <form id="peiForm">
    <!-- Dados do Aluno -->
    <label for="nome">Nome do Aluno:</label>
    <input type="text" name="nome" id="nome" required>
    <div class="grid-2">
      <input type="text" name="curso" id="curso" placeholder="Curso Técnico" required>
      <input type="text" name="unidade" id="unidade" placeholder="Unidade SENAC" required>
      <input type="text" name="periodo" id="periodo" placeholder="Período Letivo" required>
      <label for="data_elaboracao">Data de Elaboração:</label>
      <input type="date" name="data_elaboracao" id="data_elaboracao" required>
    </div>
    <label for="responsavel">Responsável pela Elaboração:</label>
    <input type="text" name="responsavel" id="responsavel" required>
    <hr style="margin: 30px 0; border: none; border-top: 1px solid #ddd;">

    <!-- Identificação do Aluno -->
    <label>Data de Nascimento:</label>
    <div class="grid-3">
      <input type="date" name="data_nascimento" id="data_nascimento">
      <input type="number" name="idade" id="idade" placeholder="Idade (anos)">
      <input type="text" name="diagnostico_cid" id="diagnostico_cid" placeholder="Diagnóstico (CID)">
      <input type="text" name="transtorno_identificado" id="transtorno_identificado" placeholder="Transtorno identificado">
      <div style="display:flex; flex-direction: column; gap: 5px;">
        <label for="laudo_medico">Laudo Médico:</label>
        <select name="laudo_medico" id="laudo_medico">
          <option value="">Selecione</option>
          <option value="Sim">Sim</option>
          <option value="Não">Não</option>
        </select>
      </div>
      <div style="display:flex; flex-direction: column; gap: 5px;">
        <label for="laudo_medico_arquivo">Upload Laudo:</label>
        <input type="file" name="laudo_medico_arquivo" id="laudo_medico_arquivo" accept=".pdf,.jpg,.jpeg,.png,.docx,.txt">
      </div>
    </div>
    <label>Profissionais que acompanham o aluno (nome e dias):</label>
    <input type="text" name="psicologo" id="psicologo" placeholder="Psicólogo (nome e dias)">
    <input type="text" name="psiquiatra" id="psiquiatra" placeholder="Psiquiatra (nome e dias)">
    <input type="text" name="psicopedagogo" id="psicopedagogo" placeholder="Psicopedagogo (nome e dias)">
    <input type="text" name="outros_profissionais" id="outros_profissionais" placeholder="Outros profissionais">

    <!-- Perfil do Aluno -->
    <label>Perfil do Aluno</label>
    <textarea name="perfil_aluno" id="perfil_aluno" rows="5" placeholder="Descreva aqui..."></textarea>

    <!-- Objetivos Gerais -->
    <label>Objetivos Gerais do PEI</label>
    <textarea name="objetivos_gerais" id="objetivos_gerais" rows="5" placeholder="Descreva aqui..."></textarea>

    <!-- Adaptações Pedagógicas -->
    <label>Adaptações e Estratégias Pedagógicas</label>
    <textarea name="adaptaçoes_pedagogicas" id="adaptaçoes_pedagogicas" rows="8" placeholder="Descreva as adaptações pedagógicas utilizadas..."></textarea>

    <!-- Intervenções Complementares -->
    <label>Intervenções Complementares</label>
    <textarea name="intervencoes_complementares" id="intervencoes_complementares" rows="5" placeholder="Descreva as intervenções complementares..."></textarea>

    <!-- Metas Individuais -->
    <label>Metas Individuais (Curto, Médio e Longo Prazo)</label>
    <table>
      <thead>
        <tr>
          <th>Período</th><th>Meta</th><th>Responsável</th><th>Avaliação</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Curto prazo</td>
          <td><input type="text" name="meta_curto_prazo" id="meta_curto_prazo" placeholder="Meta"></td>
          <td><input type="text" name="responsavel_curto" id="responsavel_curto" placeholder="Responsável"></td>
          <td><input type="text" name="avaliacao_curto" id="avaliacao_curto" placeholder="Avaliação"></td>
        </tr>
        <tr>
          <td>Médio prazo</td>
          <td><input type="text" name="meta_medio_prazo" id="meta_medio_prazo" placeholder="Meta"></td>
          <td><input type="text" name="responsavel_medio" id="responsavel_medio" placeholder="Responsável"></td>
          <td><input type="text" name="avaliacao_medio" id="avaliacao_medio" placeholder="Avaliação"></td>
        </tr>
        <tr>
          <td>Longo prazo</td>
          <td><input type="text" name="meta_longo_prazo" id="meta_longo_prazo" placeholder="Meta"></td>
          <td><input type="text" name="responsavel_longo" id="responsavel_longo" placeholder="Responsável"></td>
          <td><input type="text" name="avaliacao_longo" id="avaliacao_longo" placeholder="Avaliação"></td>
        </tr>
      </tbody>
    </table>

    <!-- Acompanhamento -->
    <label>Observações gerais:</label>
    <textarea name="observacoes_gerais" id="observacoes_gerais" rows="4" placeholder="Observações gerais..."></textarea>

    <label for="proxima_avaliacao">Próxima Avaliação</label>
    <div class="grid-2">
      <input type="date" name="proxima_avaliacao" id="proxima_avaliacao">
      <input type="text" name="responsavel_legal" id="responsavel_legal" placeholder="Responsável legal">
      <input type="text" name="orientador_responsavel" id="orientador_responsavel" placeholder="Orientador responsável">
      <input type="text" name="supervisor" id="supervisor" placeholder="Supervisor">
      <input type="text" name="gerente_unidade" id="gerente_unidade" placeholder="Gerente de unidade">
    </div>

    <!-- Botões iniciais -->
    <div class="button-group" id="botoes-iniciais">
      <button type="submit" class="btn-salvar">Salvar PEI</button>
      <button type="button" onclick="limparCampos()" class="btn-editar">Limpar Dados</button>
      <button type="button" onclick="location.href='/dashboard'" class="btn-finalizar">Voltar</button>
    </div>

    <!-- Botões pós-salvamento -->
    <div class="button-group" id="botoes-pos-salvar" style="display: none;">
      <button type="button" onclick="editarCampos()" class="btn-editar">Editar Cadastro</button>
      <button type="button" onclick="finalizarCadastro()" class="btn-finalizar">Finalizar Cadastro</button>
    </div>

    <!-- Feedback -->
    <p id="msg"></p>
  </form>
</div>

<script>
  // Garantindo que o formulário esteja disponível
  const form = document.getElementById("peiForm");
  const msgEl = document.getElementById("msg");

  if (!form) {
    console.error("❌ Formulário não encontrado!");
  } else {
    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const nome = document.getElementById("nome");
      const curso = document.getElementById("curso");
      const unidade = document.getElementById("unidade");
      const periodo = document.getElementById("periodo");
      const data_elaboracao = document.getElementById("data_elaboracao");
      const responsavel = document.getElementById("responsavel");

      // Verifica se todos os campos obrigatórios estão preenchidos
      const requiredFields = [
        { el: nome, name: "Nome do Aluno" },
        { el: curso, name: "Curso Técnico" },
        { el: unidade, name: "Unidade SENAC" },
        { el: periodo, name: "Período Letivo" },
        { el: data_elaboracao, name: "Data de Elaboração" },
        { el: responsavel, name: "Responsável pela Elaboração" }
      ];

      let missingField = false;

      requiredFields.forEach(({ el, name }) => {
        if (!el || !el.value.trim()) {
          console.warn(`Campo ausente: ${name}`);
          missingField = true;
        }
      });

      if (missingField) {
        msgEl.style.color = "red";
        msgEl.innerText = "⚠️ Campos obrigatórios ausentes.";
        return;
      }

      const aluno = {
        nome: nome.value.trim(),
        curso: curso.value.trim(),
        unidade: unidade.value.trim(),
        periodo: periodo.value.trim(),
        data_elaboracao: data_elaboracao.value,
        responsavel: responsavel.value.trim(),
        data_nascimento: document.getElementById("data_nascimento")?.value || "",
        idade: document.getElementById("idade")?.value || "",
        diagnostico_cid: document.getElementById("diagnostico_cid")?.value || "",
        transtorno_identificado: document.getElementById("transtorno_identificado")?.value || "",
        laudo_medico: document.getElementById("laudo_medico")?.value || "",
        psicologo: document.getElementById("psicologo")?.value || "",
        psiquiatra: document.getElementById("psiquiatra")?.value || "",
        psicopedagogo: document.getElementById("psicopedagogo")?.value || "",
        outros_profissionais: document.getElementById("outros_profissionais")?.value || "",
        perfil_aluno: document.getElementById("perfil_aluno")?.value || "",
        observacoes_gerais: document.getElementById("observacoes_gerais")?.value || "",
        proxima_avaliacao: document.getElementById("proxima_avaliacao")?.value || "",
        responsavel_legal: document.getElementById("responsavel_legal")?.value || "",
        orientador_responsavel: document.getElementById("orientador_responsavel")?.value || "",
        supervisor: document.getElementById("supervisor")?.value || "",
        gerente_unidade: document.getElementById("gerente_unidade")?.value || ""
      };

      const conteudo = {
        objetivos_gerais: document.getElementById("objetivos_gerais")?.value || "",
        adaptaçoes_pedagogicas: document.getElementById("adaptaçoes_pedagogicas")?.value || "",
        intervencoes_complementares: document.getElementById("intervencoes_complementares")?.value || "",
        metas: {
          curto_prazo: {
            meta: document.getElementById("meta_curto_prazo")?.value || "",
            responsavel: document.getElementById("responsavel_curto")?.value || "",
            avaliacao: document.getElementById("avaliacao_curto")?.value || ""
          },
          medio_prazo: {
            meta: document.getElementById("meta_medio_prazo")?.value || "",
            responsavel: document.getElementById("responsavel_medio")?.value || "",
            avaliacao: document.getElementById("avaliacao_medio")?.value || ""
          },
          longo_prazo: {
            meta: document.getElementById("meta_longo_prazo")?.value || "",
            responsavel: document.getElementById("responsavel_longo")?.value || "",
            avaliacao: document.getElementById("avaliacao_longo")?.value || ""
          }
        }
      };

      const formData = new FormData();
      formData.append("aluno", JSON.stringify(aluno));
      formData.append("conteudo", JSON.stringify(conteudo));

      const laudoInput = document.getElementById("laudo_medico_arquivo");
      if (laudoInput && laudoInput.files.length > 0) {
        formData.append("laudo_medico_arquivo", laudoInput.files[0]);
      }

      try {
        const res = await fetch("/api/pei", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          msgEl.style.color = "green";
          msgEl.innerText = "✅ PEI salvo com sucesso!";
          bloquearCampos(true);
          ocultarBotoesIniciais();
          mostrarBotoesPosSalvar();
        } else {
          msgEl.style.color = "red";
          msgEl.innerText = "❌ Erro ao salvar: " + (data.error || "Verifique os dados.");
        }
      } catch (err) {
        console.error("Erro ao salvar:", err);
        msgEl.style.color = "red";
        msgEl.innerText = "❌ Falha na comunicação com o servidor.";
      }
    });
  }

  function bloquearCampos(bloquear = true) {
    const inputs = document.querySelectorAll("input, select, textarea");
    inputs.forEach(el => {
      if (el.type !== 'button') el.readOnly = bloquear;
    });
  }

  function limparCampos() {
    const form = document.getElementById("peiForm");
    if (form) form.reset();
    msgEl.innerText = "";
    mostrarBotoesIniciais();
    ocultarBotoesPosSalvar();
  }

  function editarCampos() {
    bloquearCampos(false);
    ocultarBotoesPosSalvar();
    mostrarBotoesIniciais();
    msgEl.style.color = "green";
    msgEl.innerText = "Você está editando o cadastro.";
  }

  function finalizarCadastro() {
    const aluno = {
      nome: document.getElementById("nome").value,
      curso: document.getElementById("curso").value,
      unidade: document.getElementById("unidade").value,
      periodo: document.getElementById("periodo").value,
      data_elaboracao: document.getElementById("data_elaboracao").value,
      responsavel: document.getElementById("responsavel").value,
      data_nascimento: document.getElementById("data_nascimento")?.value || "",
      idade: document.getElementById("idade")?.value || "",
      diagnostico_cid: document.getElementById("diagnostico_cid")?.value || "",
      transtorno_identificado: document.getElementById("transtorno_identificado")?.value || "",
      laudo_medico: document.getElementById("laudo_medico")?.value || "",
      psicologo: document.getElementById("psicologo")?.value || "",
      psiquiatra: document.getElementById("psiquiatra")?.value || "",
      psicopedagogo: document.getElementById("psicopedagogo")?.value || "",
      outros_profissionais: document.getElementById("outros_profissionais")?.value || "",
      perfil_aluno: document.getElementById("perfil_aluno")?.value || "",
      observacoes_gerais: document.getElementById("observacoes_gerais")?.value || "",
      proxima_avaliacao: document.getElementById("proxima_avaliacao")?.value || "",
      responsavel_legal: document.getElementById("responsavel_legal")?.value || "",
      orientador_responsavel: document.getElementById("orientador_responsavel")?.value || "",
      supervisor: document.getElementById("supervisor")?.value || "",
      gerente_unidade: document.getElementById("gerente_unidade")?.value || "",
      meta_curto_prazo: document.getElementById("meta_curto_prazo")?.value || "",
      responsavel_curto: document.getElementById("responsavel_curto")?.value || "",
      avaliacao_curto: document.getElementById("avaliacao_curto")?.value || "",
      meta_medio_prazo: document.getElementById("meta_medio_prazo")?.value || "",
      responsavel_medio: document.getElementById("responsavel_medio")?.value || "",
      avaliacao_medio: document.getElementById("avaliacao_medio")?.value || "",
      meta_longo_prazo: document.getElementById("meta_longo_prazo")?.value || "",
      responsavel_longo: document.getElementById("responsavel_longo")?.value || "",
      avaliacao_longo: document.getElementById("avaliacao_longo")?.value || "",
      adaptaçoes_pedagogicas: document.getElementById("adaptaçoes_pedagogicas")?.value || "",
      intervencoes_complementares: document.getElementById("intervencoes_complementares")?.value || "",
      objetivos_gerais: document.getElementById("objetivos_gerais")?.value || ""
    };

    localStorage.setItem("peiPreview", JSON.stringify(aluno));
    localStorage.setItem("peiConteudo", JSON.stringify(conteudo));
    window.open('/preview', '_blank');
    alert("✅ Cadastro finalizado. Visualize-o na nova aba.");
  }

  function mostrarBotoesIniciais() {
    const botoes = document.getElementById("botoes-iniciais");
    if (botoes) botoes.style.display = "flex";
  }

  function ocultarBotoesIniciais() {
    const botoes = document.getElementById("botoes-iniciais");
    if (botoes) botoes.style.display = "none";
  }

  function mostrarBotoesPosSalvar() {
    const botoes = document.getElementById("botoes-pos-salvar");
    if (botoes) botoes.style.display = "flex";
  }

  function ocultarBotoesPosSalvar() {
    const botoes = document.getElementById("botoes-pos-salvar");
    if (botoes) botoes.style.display = "none";
  }
</script>
</body>
</html>
