<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Registros</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h2 {
            color: #003D7C; 
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: left;
        }

        th {
            background-color: #F7931E;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button.btn-excluir,
        button.btn-limpar,
        button.btn-csv,
        button.btn-excel {
            padding: 10px 16px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            min-width: 160px;
        }

        button.btn-excluir {
            background-color: #e74c3c;
            color: white;
        }

        button.btn-excluir:hover {
            background-color: #c0392b;
        }

        button.btn-limpar {
            background-color: #e67e22;
            color: white;
        }

        button.btn-limpar:hover {
            background-color: #d35400;
        }

        button.btn-csv,
        button.btn-excel {
            background-color: #27ae60;
            color: white;
        }

        button.btn-csv:hover,
        button.btn-excel:hover {
            background-color: #1e8449;
        }

        @media (max-width: 768px) {
            .actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Registros de Alunos</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Curso</th>
                <th>Unidade</th>
                <th>Data de Elaboração</th>
                <th>Próxima Avaliação</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="registros-body">
            <tr><td colspan="7">Carregando alunos...</td></tr>
        </tbody>
    </table>

    <div class="button-group actions">
        <button class="btn-excluir" onclick="excluirTodos()">🗑️ Limpar Todos</button>
        <button class="btn-csv" onclick="window.location.href='/api/alunos/csv'">📄 Baixar CSV</button>
        <button class="btn-excel" onclick="window.location.href='/api/alunos/excel'">📊 Baixar Excel</button>
    </div>
</div>

<script>
    window.onload = () => carregarRegistros();

    async function carregarRegistros() {
        try {
            const res = await fetch("/api/alunos");
            const alunos = await res.json();

            const tbody = document.getElementById("registros-body");
            tbody.innerHTML = "";

            if (!Array.isArray(alunos) || !alunos.length) {
                tbody.innerHTML = "<tr><td colspan='7'>Nenhum aluno cadastrado.</td></tr>";
                return;
            }

            alunos.forEach(aluno => {
                const dataElaboracao = aluno.data_elaboracao ? new Date(aluno.data_elaboracao).toLocaleDateString() : "N/A";
                const proximaAvaliacao = aluno.proxima_avaliacao ? new Date(aluno.proxima_avaliacao).toLocaleDateString() : "N/A";

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${aluno.id}</td>
                    <td>${aluno.nome}</td>
                    <td>${aluno.curso}</td>
                    <td>${aluno.unidade}</td>
                    <td>${dataElaboracao}</td>
                    <td>${proximaAvaliacao}</td>
                    <td>
                        <button class="btn-excluir" onclick="excluirRegistro(${aluno.id})">❌ Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

        } catch (err) {
            console.error("Erro ao carregar registros:", err);
            document.getElementById("msg").innerText = "❌ Erro ao carregar dados dos alunos.";
        }
    }

    async function excluirRegistro(id) {
        if (!confirm("Tem certeza que deseja excluir este aluno?")) return;

        try {
            const res = await fetch(`/api/alunos/excluir/${id}`, {
                method: "DELETE"
            });

            const data = await res.json();
            alert(data.message || "✅ Registro excluído!");
            carregarRegistros(); // Atualiza a tabela
        } catch (err) {
            alert("❌ Erro ao excluir registro.");
            console.error(err);
        }
    }

    async function excluirTodosRegistros() {
        if (!confirm("Tem certeza que deseja excluir TODOS os alunos?")) return;

        try {
            const res = await fetch("/api/alunos/excluir-tudo", {
                method: "DELETE"
            });

            const data = await res.json();
            alert(data.message || "✅ Todos os alunos foram excluídos.");
            carregarRegistros(); // Atualiza a tabela
        } catch (err) {
            alert("❌ Erro ao excluir todos.");
            console.error(err);
        }
    }
</script>

</body>
</html>
