<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Histórico de Alterações - PEI</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .form-container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      padding: 30px;
    }
    h2 {
      color: #003D7C;
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 10px;
    }
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    button {
      background-color: #F7931E;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #e67e22;
    }
    .card-historico {
      background: #f9f9f9;
      padding: 20px;
      border-left: 5px solid #F7931E;
      margin-top: 20px;
      border-radius: 8px;
    }
    pre {
      background: #f1f1f1;
      padding: 10px;
      overflow-x: auto;
      font-size: 13px;
      border-radius: 6px;
    }
    #msg {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
    #msg.red { color: red; }
    #msg.green { color: green; }
  </style>
</head>
<body>
<div class="form-container">
  <h2>Histórico de Alterações</h2>
  <label for="peiId">Digite o ID do PEI:</label>
  <input type="number" id="peiId" placeholder="Ex: 123">
  <button onclick="carregarHistorico()">Carregar Histórico</button>
  <p id="msg"></p>
  <div id="historicoArea"></div>
</div>

<script>
  async function carregarHistorico() {
    const peiId = document.getElementById('peiId').value.trim();
    const historicoArea = document.getElementById('historicoArea');
    const msgEl = document.getElementById('msg');

    if (!peiId || isNaN(peiId)) {
      msgEl.style.color = 'red';
      msgEl.innerText = "Por favor, insira um ID válido.";
      return;
    }

    try {
      const res = await fetch(`/api/historico/${peiId}`);
      const historico = await res.json();

      if (!historico.length) {
        msgEl.style.color = 'red';
        msgEl.innerText = "Nenhuma alteração registrada ainda.";
        historicoArea.innerHTML = "";
        return;
      }

      msgEl.innerText = "";
      historicoArea.innerHTML = "<h3>Registro de Alterações</h3>";

      historico.forEach(h => {
        const antes = JSON.parse(h.conteudo_anterior || '{}');
        const depois = JSON.parse(h.conteudo_novo || '{}');

        const diff = Object.keys(depois).reduce((acc, key) => {
          if (depois[key] !== antes[key]) {
            acc.push(`• ${key}: "${antes[key]}" → "${depois[key]}"`);
          }
          return acc;
        }, []);

        historicoArea.innerHTML += `
          <div class="card-historico">
            <strong>ID do PEI:</strong> ${h.pei_id}<br>
            <strong>Editado por:</strong> Usuário ID ${h.editado_por}<br>
            <strong>Data da Edição:</strong> ${new Date(h.data_edicao).toLocaleString()}<br><br>
            <strong>Diferenças:</strong>
            <ul>${diff.map(d => `<li>${d}</li>`).join("")}</ul>
          </div>`;
      });

    } catch (err) {
      console.error("Erro ao carregar histórico:", err);
      msgEl.style.color = "red";
      msgEl.innerText = "❌ Falha ao carregar histórico.";
    }
  }
</script>
</body>
</html>
